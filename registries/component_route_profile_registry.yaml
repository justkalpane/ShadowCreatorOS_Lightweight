# MAC-06.2D Component Route Profile Registry
status: ACTIVE_REGISTRY
purpose: "Route-specific profile source for component depth enrichment. Active components must resolve to one profile and exact pointer IDs."
profiles:
  - profile_id: topic_discovery_profile
    route_families:
      - topic_discovery
      - trend_research
    activation_triggers:
      - topic request
      - trend request
      - audience opportunity mining
      - keyword/topic discovery route
    required_input_packets:
      - topic_intake_packet
      - trend_signal_packet
      - source_evidence_packet
    emitted_output_packets:
      - research_brief_packet
      - topic_quality_packet
      - trend_opportunity_packet
    required_communication_pointer_ids:
      - PTR_DIRECTOR_AGENT
      - PTR_AGENT_SUBAGENT
      - PTR_SUBAGENT_SKILL
      - PTR_SKILL_SUBSKILL
      - PTR_RESEARCH_SCRIPT
    required_quality_gates:
      - topic_quality_gate
      - freshness_gate
      - audience_fit_gate
      - production_feasibility_gate
    validator_bindings:
      - universal_component_contract_present
      - selected_component_missing_input_schema
      - selected_component_missing_output_schema
      - selected_component_missing_communication_pointer
      - quality_scores_present
    fallback_behavior: "BLOCKED_BEFORE_OUTPUT if trend/source evidence or topic_quality_packet is missing; otherwise route to research_synthesis_profile."
    lineage_fields:
      - topic_intake_packet_id
      - source_evidence_packet_id
      - trend_signal_packet_id
      - decision_reason
      - evidence_path
    provider_boundary: "provider_execution_allowed=false unless approval_packet explicitly authorizes provider handoff"
    production_score_fields:
      - topic_score
      - freshness_score
      - audience_fit_score
      - risk_score
      - lineage_score
    human_approval_points:
      - approve_topic
      - revise_angle
      - request_more_sources
      - reject_topic
    status_limits:
      - no provider execution
      - no n8n execution
      - no onboarding claim
  - profile_id: research_synthesis_profile
    route_families:
      - trend_research
      - topic_discovery
      - script_generation
    activation_triggers:
      - freshness-sensitive task
      - source-backed claim
      - research synthesis before script
    required_input_packets:
      - topic_intake_packet
      - trend_signal_packet
      - source_evidence_packet
    emitted_output_packets:
      - research_brief_packet
      - source_evidence_packet
      - claim_risk_packet
    required_communication_pointer_ids:
      - PTR_DIRECTOR_AGENT
      - PTR_AGENT_SUBAGENT
      - PTR_SUBAGENT_SKILL
      - PTR_SKILL_SUBSKILL
      - PTR_RESEARCH_SCRIPT
    required_quality_gates:
      - source_breadth_gate
      - claim_confidence_gate
      - freshness_gate
      - contradiction_gate
    validator_bindings:
      - source_breadth_lock_status
      - per_tool_source_map_present
      - exact_rule_evidence_present
      - selected_component_missing_validator_binding
    fallback_behavior: "NEEDS_CONFIRMATION if source breadth is insufficient; BLOCKED_BEFORE_OUTPUT for unsupported claims."
    lineage_fields:
      - source_url
      - source_date
      - claim_id
      - confidence_score
      - research_brief_packet_id
    provider_boundary: "web research may cite sources; provider/media execution remains disabled without approval_packet"
    production_score_fields:
      - source_score
      - freshness_score
      - claim_confidence_score
      - contradiction_score
      - lineage_score
    human_approval_points:
      - approve_research_brief
      - request_more_sources
      - downgrade_claim
      - reject_claim
    status_limits:
      - no fake realtime claim
      - no provider execution
      - no n8n execution
