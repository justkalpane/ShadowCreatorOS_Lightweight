  strategic_authority_directors: [Krishna]
  governance_authority_directors: [Saraswati, Durga, Kubera, Yama]
  orchestration_pattern: hierarchical_with_co_governance
  decision_flow:
    stage_1_thumbnail_design:
      owner: Krishna
      co_governors: [Durga, Saraswati]
      decision_authority: Krishna
    stage_2_visual_planning:
      owner: Saraswati
      co_governors: [Durga, Krishna]
      decision_authority: Saraswati
    stage_3_audio_optimization:
      owner: Saraswati
      co_governors: [Kubera, Yama]
      decision_authority: Saraswati
    stage_4_package_assembly:
      owner: Krishna
      co_governors: [Durga, Kubera]
      decision_authority: Krishna
    stage_5_qa_validation:
      owner: Durga
      co_governors: [Krishna, Kubera]
      decision_authority: Durga
  escalation_flow:
    default_escalation: WF-900
    policy_violation: Yama → WF-900
    feasibility_issue: Kubera → analysis
    quality_gate_failure: Durga → remediation_path

