  - ROUTE_DEPENDENCY_EXPANSION_LOCK
  - CONSUMPTION_LOCK
  - QUALITY_LOCK
  - GOVERNANCE_LOCK
  - critique
  - rewrite_decision
  - SCRIPT_QUALITY_GATE
validator_binding:
  validator_file: validators/validate_mac06_1a_output.py
