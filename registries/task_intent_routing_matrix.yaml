  - Read runtime_contracts/DIRECTOR_SKILL_CONSUMPTION_PROTOCOL.md before content output.
  - Use the full local repo estate as the source of truth.
  - Gumloop references define quality patterns only; they do not define Shadow OS registry bindings.
