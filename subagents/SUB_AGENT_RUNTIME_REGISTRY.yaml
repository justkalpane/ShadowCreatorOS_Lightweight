mac_06_2b_universal_component_contract_upgrade:
  component_id: "SUB_AGENT_RUNTIME_REGISTRY"
  component_layer: "SUB_AGENT"
  component_name: "Sub Agent Runtime Registry"
  route_families: "general_support_profile"
  activation_triggers: "route_family in [non_content_technical_task, general_support] or explicit registry selection; mark general_support_profile only when route_family is unknown."
  upstream_inputs: [stage_execution_packet, component_control_packet, lineage_packet]
  downstream_outputs: [component_result_packet, quality_report_packet, lineage_packet]
  required_input_packets: "See runtime_contracts/UNIVERSAL_COMPONENT_CONTRACT_STANDARD.md and registries/communication_pointer_registry.yaml."
  emitted_output_packets: "Must emit typed packet named in communication pointer registry; component_result_packet, quality_report_packet, lineage_packet."
  communication_pointer_ids: [PTR_DIRECTOR_AGENT, PTR_AGENT_SUBAGENT, PTR_SUBAGENT_SKILL, PTR_SKILL_SUBSKILL, PTR_QUALITY_LINEAGE]
  quality_gates: "Must provide component_quality_score, confidence, failure_modes, and pass/fail rationale."
  validator_bindings: [universal_component_contract_present, selected_components_are_registered, quality_scores_present]
  fallback_behavior: "If required input packet or validation evidence is missing, return BLOCKED_BEFORE_OUTPUT or NEEDS_HUMAN_REVIEW; do not fabricate."
  lineage_fields: "upstream_packet_id, downstream_packet_id, evidence_path, source_component_id, decision_reason, timestamp_or_version."
  provider_boundary: provider_execution_allowed=false; "No n8n, provider, Gemini, OpenWebUI, or media execution without explicit approval; handoff packets only by default."
  status_limits: "May not claim production-ready, onboarded, provider-called, media-created, or n8n-executed without external proof."
  human_approval_points: "Required for repo write, provider execution, n8n execution, media creation, full dossier, or segment regeneration approval."
  failure_modes: "missing_input_packet, missing_output_schema, missing_validator_binding, missing_pointer, low_quality_score, provider_boundary_violation."
  handoff_targets: "Next layer defined by communication pointer registry and selected route manifest."
  production_score_fields: [component_quality_score, reliability_score, lineage_score]
  execution_lane: "Owns a bounded execution lane within the selected agent stage."
  route_binding: "Activated only when route manifest or parent agent selects this lane."
  skill_activation_rules: "May activate only skills with matching input schema and validator binding."
  validation_checkpoint: "Must record lane_output_validated=true/false and fallback if false."

mac_06_2b_component_depth_registry_extension:
  status: ACTIVE_SUPPORTING_REGISTRY_EXTENSION
  component_contract_registry: registries/component_contract_registry.yaml
  communication_pointer_registry: registries/communication_pointer_registry.yaml
  universal_component_contract_standard: runtime_contracts/UNIVERSAL_COMPONENT_CONTRACT_STANDARD.md
  required_fields_per_registered_component:
    - component_id
    - component_path
    - component_layer
    - route_family
    - upstream_dependencies
    - downstream_dependencies
    - input_packets
    - output_packets
    - communication_pointers
    - validator_binding
    - quality_binding
    - provider_boundary
    - status
    - needs_human_review
  runtime_rule: "Registry selection is incomplete unless the selected component has typed packets, communication pointers, validator binding, fallback, and lineage."
