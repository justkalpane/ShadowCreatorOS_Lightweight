version: 1
policy_id: deployment_phase1_provider_credential_lock
phase: phase1
status: active
owner: shadow_empire_phase1
purpose: >
  Enforce Phase-1 local-first deployment posture:
  zero external credentials in workflows, local-only HTTP targets, and
  provider registry lock to ollama_local as the only phase1-allowed provider.

provider_policy:
  required_default_provider: ollama_local
  required_phase1_allowed_provider_ids:
    - ollama_local
  required_deferred_provider_ids:
    - elevenlabs_api
    - heygen_api
    - youtube_data_api
  required_active_provider_ids:
    - ollama_local
  required_provider_auth_none_ids:
    - ollama_local
  required_escalation_workflow: WF-900

workflow_credential_policy:
  require_zero_workflow_credentials: true
  enforce_on_registry_workflows: true
  enforce_on_live_canonical_workflows: true

network_policy:
  allow_static_http_hosts:
    - 127.0.0.1
    - localhost
  allow_ports:
    - 5678
    - 9999
    - 11434
  allow_non_http_nodes_without_host_check: true

